<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" role="img" aria-label="BetterRoute">
  <title>BetterRoute</title>
  <defs>
    <linearGradient id="br-bg-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1E3F"/>
      <stop offset="55%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="br-path-h" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="br-word-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="br-glow-h" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g>
    <rect width="64" height="64" rx="14" ry="14" fill="url(#br-bg-h)"/>
    <g opacity="0.18" stroke="#FFFFFF" stroke-width="0.5" fill="none">
      <path d="M8 20 H56 M8 32 H56 M8 44 H56"/>
      <path d="M20 8 V56 M32 8 V56 M44 8 V56"/>
    </g>
    <path d="M14 48 C 16 32, 30 40, 34 30 S 48 18, 52 14"
          stroke="url(#br-path-h)" stroke-width="3.2"
          stroke-linecap="round" fill="none" filter="url(#br-glow-h)"/>
    <circle cx="14" cy="48" r="3.2" fill="#FFFFFF"/>
    <circle cx="14" cy="48" r="1.4" fill="#1E40AF"/>
    <circle cx="32" cy="33" r="2.2" fill="#FFFFFF" opacity="0.85"/>
    <g transform="translate(52 14) rotate(-35)">
      <path d="M-5 -4 L3 0 L-5 4 L-3 0 Z" fill="#FFFFFF"/>
    </g>
  </g>

  <g font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
     font-weight="700" font-size="24" letter-spacing="-0.5">
    <text x="80" y="40" fill="#0B1E3F">Better</text>
    <text x="155" y="40" fill="url(#br-word-accent)">Route</text>
  </g>
</svg>
