<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="BetterRoute — Ant Colony">
  <title>BetterRoute</title>
  <defs>
    <linearGradient id="ant-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1E3F"/>
      <stop offset="55%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="ant-pher" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FDE047" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FDE047" stop-opacity="0"/>
    </radialGradient>

    <symbol id="ant" viewBox="-6 -4 12 8" overflow="visible">
      <g fill="#FFFFFF" stroke="#FFFFFF" stroke-linecap="round" stroke-width="0.6">
        <line x1="-3" y1="0" x2="-5.2" y2="-2.2"/>
        <line x1="-3" y1="0" x2="-5.2" y2="0"/>
        <line x1="-3" y1="0" x2="-5.2" y2="2.2"/>
        <line x1="0" y1="0" x2="-1.5" y2="-2.6"/>
        <line x1="0" y1="0" x2="-1.5" y2="2.6"/>
        <line x1="0" y1="0" x2="1.5" y2="-2.6"/>
        <line x1="0" y1="0" x2="1.5" y2="2.6"/>
        <line x1="3" y1="-0.6" x2="5.2" y2="-2.4"/>
        <line x1="3" y1="0.6" x2="5.2" y2="2.4"/>
        <ellipse cx="-2.6" cy="0" rx="1.8" ry="1.4"/>
        <circle cx="0" cy="0" r="1.1"/>
        <circle cx="2.4" cy="0" r="1.3"/>
      </g>
    </symbol>
  </defs>

  <rect width="64" height="64" rx="14" ry="14" fill="url(#ant-bg)"/>

  <g opacity="0.18" stroke="#FFFFFF" stroke-width="0.5" fill="none">
    <path d="M8 20 H56 M8 32 H56 M8 44 H56"/>
    <path d="M20 8 V56 M32 8 V56 M44 8 V56"/>
  </g>

  <path d="M14 48 C 16 32, 30 40, 34 30 S 48 18, 52 14"
        stroke="#FDE047" stroke-opacity="0.35" stroke-width="5"
        stroke-linecap="round" fill="none"/>
  <path d="M14 48 C 16 32, 30 40, 34 30 S 48 18, 52 14"
        stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round"
        stroke-dasharray="0.1 3" fill="none"/>

  <circle cx="14" cy="48" r="3.2" fill="#FFFFFF"/>
  <circle cx="14" cy="48" r="1.4" fill="#1E40AF"/>

  <circle cx="22" cy="38" r="3.2" fill="url(#ant-pher)"/>
  <circle cx="42" cy="22" r="3.2" fill="url(#ant-pher)"/>

  <use href="#ant" x="22" y="38" transform="rotate(-35 22 38)"/>
  <use href="#ant" x="42" y="22" transform="rotate(-45 42 22)"/>

  <circle cx="52" cy="14" r="2.2" fill="#FDE047"/>
  <circle cx="52" cy="14" r="3.6" fill="none" stroke="#FDE047" stroke-width="0.8" opacity="0.6"/>
