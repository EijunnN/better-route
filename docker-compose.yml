services:
  # Centrifugo - realtime messaging server (WebSocket). See ADR-0007.
  # Core infra, not behind a profile: the app publishes monitoring and
  # chat events here and clients subscribe over WebSocket.
  centrifugo:
    image: centrifugo/centrifugo:v6
    container_name: centrifugo
    restart: unless-stopped
    command: centrifugo --health.enabled
    ports:
      - "8000:8000"
    volumes:
      - ./docker/centrifugo/config.json:/centrifugo/config.json:ro
    # Centrifugo reads CENTRIFUGO_<CONFIG_PATH> env vars natively. The left
    # side is Centrifugo's config path; the right side interpolates the
    # app's own var names from the project .env.
    environment:
      - CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY=${CENTRIFUGO_TOKEN_HMAC_SECRET_KEY}
      - CENTRIFUGO_HTTP_API_KEY=${CENTRIFUGO_API_KEY}
      - CENTRIFUGO_CLIENT_ALLOWED_ORIGINS=${CENTRIFUGO_ALLOWED_ORIGIN}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # OSRM Backend - Routing engine for real road distances/times
  osrm-backend:
    image: osrm/osrm-backend:latest
    container_name: osrm-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - ./docker/osrm:/data
    # --max-table-size: Max coordinates for distance matrix (default ~100)
    # Set to 1000 to support 300+ delivery points
    command: osrm-routed --algorithm mld --max-table-size 1000 /data/peru-latest.osrm
    profiles:
      - routing

  # VROOM - Vehicle Routing Optimization
  vroom:
    image: ghcr.io/vroom-project/vroom-docker:v1.14.0
    container_name: vroom
    restart: unless-stopped
    ports:
      - "5000:3000"
    volumes:
      - ./docker/vroom/config.yml:/conf/config.yml:ro
    depends_on:
      - osrm-backend
    profiles:
      - routing

  # Redis - sesiones, caché y ETAs en vivo. Reemplaza a Upstash (REST) por
  # una instancia local: en el modelo single-tenant por VPS no hay razón para
  # pagar por request ni sumar latencia HTTPS.
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    # AOF everysec: las sesiones sobreviven a un restart sin castigar IO.
    # volatile-lru: todas nuestras keys llevan TTL; ante presión de memoria
    # se evictan las menos usadas SIN tocar keys persistentes.
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
      --requirepass ${REDIS_PASSWORD:-betterroute}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a ${REDIS_PASSWORD:-betterroute} ping | grep PONG",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  # PostgreSQL with PostGIS (optional - for production)
  # postgres:
  #   image: postgis/postgis:16-3.4
  #   container_name: postgres
  #   restart: unless-stopped
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: planeamiento
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
